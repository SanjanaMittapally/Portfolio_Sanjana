name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio-sanjana/package-lock.json

      - name: Install
        run: cd portfolio-sanjana && npm ci

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: cd portfolio-sanjana && npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: portfolio-sanjana/out
          publish_branch: gh-pages
          force_orphan: true

